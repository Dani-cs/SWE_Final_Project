{% extends 'base.html' %}
{% block title %}Login — ListShare{% endblock %}

{% block extra_css %}
<style>
    .auth-card { max-width: 420px; margin: 3rem auto; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; }
    .auth-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 0.25rem; }
    .auth-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }
    input[type="text"], input[type="password"] {
        width: 100%; background: var(--bg); border: 1px solid var(--border);
        border-radius: 8px; padding: 0.7rem 0.9rem; color: var(--text);
        font-size: 0.95rem; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: var(--accent); }
    .btn-full { width: 100%; padding: 0.75rem; font-size: 1rem; border-radius: 10px; margin-top: 0.5rem; }
    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: 0.88rem; color: var(--muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Log in to see what people are listing.</div>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary btn-full">Log In</button>
    </form>
    <div class="auth-footer">
        Don't have an account? <a href="{% url 'register' %}">Sign up</a>
    </div>
</div>
{% endblock %}
