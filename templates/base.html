<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ListShare{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #1e1e2e;
            --accent: #7c6af7;
            --accent2: #f76a8a;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --radius: 12px;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,15,0.85); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text); }
        .btn { padding: 0.45rem 1.1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; border: none; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #6a59e0; }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .container { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }
        .messages { list-style: none; margin-bottom: 1rem; }
        .messages li { padding: 0.75rem 1rem; border-radius: var(--radius); margin-bottom: 0.5rem; font-size: 0.9rem; }
        .messages .success { background: #1a2e1a; color: #6ee86e; border: 1px solid #2a4a2a; }
        .messages .error { background: #2e1a1a; color: #e86e6e; border: 1px solid #4a2a2a; }
        .messages .info { background: #1a1a2e; color: #6e8ee8; border: 1px solid #2a2a4a; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<nav>
    <a class="nav-logo" href="{% url 'home' %}">ListShare</a>
    <div class="nav-links">
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">@{{ user.username }}</a>
            <a href="{% url 'logout' %}" class="btn btn-outline">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}" class="btn btn-primary">Sign Up</a>
        {% endif %}
    </div>
</nav>
<div class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
